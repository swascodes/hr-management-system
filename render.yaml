services:
  # Backend Node.js Service (NestJS)
  - type: web
    name: hr-backend
    env: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npx prisma db push && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: hr-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://hr-frontend.onrender.com
      - key: COMPANY_PREFIX
        value: OI

  # Frontend Node.js Service (Next.js)
  - type: web
    name: hr-frontend
    env: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://hr-backend.onrender.com/api

databases:
  # Managed PostgreSQL Database
  - name: hr-db
    databaseName: hrmadeeasy
    user: hradmin
